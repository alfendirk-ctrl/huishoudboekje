name: Keep Supabase Active

on:
  schedule:
    - cron: '0 8 */2 * *'  # elke 2 dagen om 08:00 UTC
  workflow_dispatch:        # ook handmatig te starten

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Schrijf keep-alive naar Supabase
        run: |
          curl -sf \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/storage" \
            -X POST \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"key\":\"__keepalive__\",\"value\":\"\\\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\\\"\"}" \
            && echo "Keep-alive geschreven" || echo "Mislukt"
