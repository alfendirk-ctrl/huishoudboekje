name: Keep Supabase Active

on:
  schedule:
    - cron: '0 8 */5 * *'  # elke 5 dagen om 08:00 UTC
  workflow_dispatch:        # ook handmatig te starten

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase storage table
        run: |
          curl -sf \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/storage?select=key&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON }}" \
            && echo "Supabase actief" || echo "Ping mislukt"
